  <script>
    function playGame(jar, className, canvasSize = 'size-no', rotate = '270') {
      const baseUrl = 'java/mobile.html';
      let url = `${baseUrl}?jars=jar/${jar}`;
      if (className) {
        url += `&midletClassName=${className}`;
      }
      url += `&gamepad=1&canvasSize=${canvasSize}&gameresize=resize-1`;
      if (rotate) {
        url += `&rotate=${rotate}`;
      }
      window.location.href = url;
    }
  </script>
