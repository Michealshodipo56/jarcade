<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JARCADE — Reset Password</title>
  <link rel="icon" type="image/webp" href="images/icon.webp">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Orbitron:wght@700&display=swap" rel="stylesheet">
  <script src="https://kit.fontawesome.com/5a3281998b.js" crossorigin="anonymous" defer></script>
  <link rel="stylesheet" href="login.css">
  <link rel="stylesheet" href="ghost-loader.css">
  <link rel="stylesheet" href="ui-enhancements.css">
  <style>
    .reset-panel { opacity: 1; max-width: 460px; width: min(100%, calc(100vw - 40px)); }
    .cta-btn.is-loading { opacity: 0.75; pointer-events: none; }
  </style>
</head>
<body>
  <div class="scene">
    <div class="panel reset-panel">
      <div class="panel-logo">
        <a href="index.html"><img src="images/logo.webp" alt="JarCade" class="logo-img"></a>
        <div class="logo-tagline">PASSWORD RESET</div>
      </div>

      <h2 class="form-heading">
        <span class="heading-sub">CHOOSE A NEW PASSWORD</span>
      </h2>

      <form class="auth-form" id="resetForm" novalidate>
        <div class="field-group">
          <label class="field-label" for="resetPassword">
            <i class="fa-solid fa-lock"></i> New password
          </label>
          <div class="field-wrap">
            <input type="password" id="resetPassword" name="new-password" class="field-input"
                   placeholder="At least 6 characters" autocomplete="new-password" minlength="6" required>
            <span class="field-line"></span>
          </div>
        </div>

        <div class="field-group">
          <label class="field-label" for="resetConfirm">
            <i class="fa-solid fa-shield-halved"></i> Confirm password
          </label>
          <div class="field-wrap">
            <input type="password" id="resetConfirm" name="confirm-password" class="field-input"
                   placeholder="Repeat your password" autocomplete="new-password" minlength="6" required>
            <span class="field-line"></span>
          </div>
        </div>

        <button type="submit" class="cta-btn" id="resetBtn">
          <span class="btn-bg"></span>
          <span class="btn-content">
            <i class="fa-solid fa-key"></i>
            <span>Update password</span>
          </span>
          <span class="btn-shine"></span>
        </button>
      </form>

      <p class="switch-text">
        <a href="login.html" class="switch-btn" style="background:none;border:none;cursor:pointer">Back to login</a>
      </p>
    </div>
  </div>

  <script src="config.js"></script>
  <script src="notifications.js"></script>
  <script src="ghost-loader.js"></script>
  <script src="ui-shell.js"></script>
  <script src="auth.js"></script>
  <script src="reset-password.js"></script>
</body>
</html>
