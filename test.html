<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
</head>
<style>
  .box {
    width: 100px;
    height: 100px;
    background-color: red;
  }
</style>

<body>

  <script>
    function playGame(jar, className, canvasSize = 'size-no', rotate = '270') {
      const baseUrl = 'java/mobile.html';
      let url = `${baseUrl}?jars=jar/${jar}`;
      if (className) {
        url += `&midletClassName=${className}`;
      }
      url += `&gamepad=1&canvasSize=${canvasSize}&gameresize=resize-1`;
      if (rotate) {
        url += `&rotate=${rotate}`;
      }
      window.location.href = url;
    }
  </script>

  <div class="box"></div>

  <a href="index.html">Back to Site</a>
  <hr>

  <h3>Test Games</h3>
  <div style="display: flex; flex-wrap: wrap; gap: 10px;">
    <button onclick="playGame('gangstar_rio_city_480x800.jar', 'GloftGRIO', 'size-480x800')">
      Gangstar Rio (480x800)
    </button>

    <button onclick="playGame('thor_the_dark_world_480x800_touch_192928.jar', 'GloftGRIO', 'size-480x800')">
      Thor The Dark World (480x800)
    </button>
    
  </div>
    
  <br>

</body>

</html>
